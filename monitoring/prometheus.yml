## Prometheus Scrape Configuration
## Path: monitoring/prometheus.yml

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: ai-job-agent
    environment: production

alerting:
  alertmanagers:
    - static_configs:
        - targets: [alertmanager:9093]

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:

  - job_name: ai-job-agent
    static_configs:
      - targets: [api:8000]
    metrics_path: /metrics

  - job_name: redis
    static_configs:
      - targets: [redis-exporter:9121]

  - job_name: postgres
    static_configs:
      - targets: [postgres-exporter:9187]

  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]
